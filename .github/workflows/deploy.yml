name: Deploy Dataflow Flex Template


on:
  push:
    branches: [ "main" ]


jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT }}

    - name: Configure Docker Auth
      run: gcloud auth configure-docker gcr.io --quiet


    - name: Build Docker Image
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/dataflow-pipeline:latest .


    - name: Push Docker Image
      run: |
        docker push gcr.io/${{ secrets.GCP_PROJECT }}/dataflow-pipeline:latest


    - name: Build Dataflow Flex Template
      run: |
        gcloud dataflow flex-template build gs://${{ secrets.GCS_TEMPLATE_BUCKET }}/pipeline-template.json \
        --image gcr.io/${{ secrets.GCP_PROJECT }}/dataflow-pipeline:latest \
        --sdk-language "PYTHON"